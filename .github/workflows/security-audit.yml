name: Security Audit

on:
  # Run daily at 3 AM UTC
  schedule:
    - cron: '0 3 * * *'
  
  # Run on every push to main/develop
  push:
    branches: [ main, develop ]
  
  # Run on pull requests
  pull_request:
    branches: [ main ]
  
  # Run on releases
  release:
    types: [ published ]
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      severity_threshold:
        description: 'Minimum severity level to fail (Low, Medium, High, Critical)'
        required: false
        default: 'Medium'
        type: choice
        options:
          - Low
          - Medium
          - High
          - Critical

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      
      - name: Set audit configuration
        id: config
        run: |
          # Set severity threshold
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.severity_threshold }}" ]; then
            SEVERITY="${{ github.event.inputs.severity_threshold }}"
          else
            SEVERITY="Medium"
          fi
          
          echo "severity=$SEVERITY" >> $GITHUB_OUTPUT
          echo "Severity threshold: $SEVERITY"
      
      - name: Run security audit
        id: audit
        continue-on-error: true
        env:
          AUDIT_SEVERITY: ${{ steps.config.outputs.severity }}
          AUDIT_CHECK_YANKED: true
        run: |
          echo "Running security audit with severity threshold: $AUDIT_SEVERITY"
          
          # Run the security audit script
          cargo run --manifest-path scripts/Cargo.toml --bin security-audit 2>&1 | tee audit-output.log
          
          AUDIT_EXIT_CODE=$?
          echo "exit_code=$AUDIT_EXIT_CODE" >> $GITHUB_OUTPUT
          
          if [ $AUDIT_EXIT_CODE -eq 0 ]; then
            echo "vulnerabilities_found=false" >> $GITHUB_OUTPUT
            echo "✅ Security audit passed - no vulnerabilities found"
          else
            echo "vulnerabilities_found=true" >> $GITHUB_OUTPUT
            echo "❌ Security audit failed - vulnerabilities found"
          fi
      
      - name: Parse audit results
        if: always()
        id: parse
        run: |
          # Extract vulnerability count from audit output
          if [ -f audit-output.log ]; then
            VULN_COUNT=$(grep -oP 'VULNERABILITIES FOUND: \K[0-9]+' audit-output.log || echo "0")
            YANKED_COUNT=$(grep -oP 'YANKED CRATES FOUND: \K[0-9]+' audit-output.log || echo "0")
            
            echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
            echo "yanked_count=$YANKED_COUNT" >> $GITHUB_OUTPUT
            
            echo "Vulnerabilities: $VULN_COUNT"
            echo "Yanked crates: $YANKED_COUNT"
          fi
      
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report-${{ github.run_id }}
          path: audit-output.log
          retention-days: 90
      
      - name: Generate issue report
        if: steps.audit.outputs.vulnerabilities_found == 'true'
        id: issue-report
        run: |
          REPORT_FILE="vulnerability-report.md"
          
          echo "# Security Vulnerabilities Detected" > "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "**Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> "$REPORT_FILE"
          echo "**Commit**: ${{ github.sha }}" >> "$REPORT_FILE"
          echo "**Branch**: ${{ github.ref_name }}" >> "$REPORT_FILE"
          echo "**Run**: [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$REPORT_FILE"
          echo "**Severity Threshold**: ${{ steps.config.outputs.severity }}" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          
          echo "## Summary" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "- **Vulnerabilities**: ${{ steps.parse.outputs.vuln_count }}" >> "$REPORT_FILE"
          echo "- **Yanked Crates**: ${{ steps.parse.outputs.yanked_count }}" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          
          echo "## Details" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "\`\`\`" >> "$REPORT_FILE"
          cat audit-output.log >> "$REPORT_FILE"
          echo "\`\`\`" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          
          echo "## Remediation Steps" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "1. Review each vulnerability and assess impact on ELARA Protocol" >> "$REPORT_FILE"
          echo "2. Update affected dependencies to patched versions" >> "$REPORT_FILE"
          echo "3. Run \`cargo update\` to update Cargo.lock" >> "$REPORT_FILE"
          echo "4. Test the changes thoroughly" >> "$REPORT_FILE"
          echo "5. Re-run security audit to verify fixes" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "## Resources" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "- [RustSec Advisory Database](https://rustsec.org/)" >> "$REPORT_FILE"
          echo "- [cargo-audit Documentation](https://github.com/rustsec/rustsec)" >> "$REPORT_FILE"
          echo "- [ELARA Security Policy](../SECURITY.md)" >> "$REPORT_FILE"
      
      - name: Create GitHub issue for vulnerabilities
        if: steps.audit.outputs.vulnerabilities_found == 'true' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('vulnerability-report.md', 'utf8');
            
            // Check if there's already an open issue for security vulnerabilities
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,vulnerability',
              per_page: 100
            });
            
            const existingIssue = issues.data.find(issue => 
              issue.title.includes('[Security Audit]') && 
              issue.created_at > new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString()
            );
            
            if (existingIssue) {
              // Update existing issue with new information
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `## Updated Security Audit Results\n\n${report}\n\n---\n*Automated update from [workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`
              });
              
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              // Create new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Security Audit] Vulnerabilities detected - ${new Date().toISOString().split('T')[0]}`,
                body: report,
                labels: ['security', 'vulnerability', 'priority:high', 'automated']
              });
              
              console.log(`Created issue #${issue.data.number}`);
            }
      
      - name: Add job summary
        if: always()
        run: |
          echo "# Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Severity Threshold**: ${{ steps.config.outputs.severity }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.audit.outputs.vulnerabilities_found }}" = "true" ]; then
            echo "## ❌ Vulnerabilities Found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Vulnerabilities**: ${{ steps.parse.outputs.vuln_count }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Yanked Crates**: ${{ steps.parse.outputs.yanked_count }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "See the [audit report artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ No Vulnerabilities Found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All dependencies are secure and up-to-date." >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Fail job if vulnerabilities found
        if: steps.audit.outputs.vulnerabilities_found == 'true'
        run: |
          echo "❌ Security audit failed - vulnerabilities found"
          echo "Vulnerabilities: ${{ steps.parse.outputs.vuln_count }}"
          echo "Yanked crates: ${{ steps.parse.outputs.yanked_count }}"
          exit 1

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Generate SBOM
        env:
          SBOM_OUTPUT: sbom.json
        run: |
          echo "Generating SBOM for ELARA Protocol..."
          cargo run --manifest-path scripts/Cargo.toml --bin generate-sbom
          
          # Verify SBOM was created
          if [ ! -f sbom.json ]; then
            echo "❌ SBOM generation failed - file not created"
            exit 1
          fi
          
          # Validate SBOM is valid JSON
          if ! jq empty sbom.json 2>/dev/null; then
            echo "❌ SBOM is not valid JSON"
            exit 1
          fi
          
          echo "✅ SBOM generated successfully"
          echo "File size: $(stat -f%z sbom.json 2>/dev/null || stat -c%s sbom.json) bytes"
          echo "Components: $(jq '.components | length' sbom.json)"
      
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 90
      
      - name: Upload SBOM to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.json
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Add SBOM summary
        run: |
          echo "# SBOM Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "**Format**: CycloneDX 1.5 JSON" >> $GITHUB_STEP_SUMMARY
          echo "**Components**: $(jq '.components | length' sbom.json)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "✅ SBOM uploaded to release assets" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ SBOM generated and uploaded as artifact" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the SBOM from the [workflow artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [security-audit, generate-sbom]
    if: always() && github.event_name == 'schedule'
    
    steps:
      - name: Generate notification summary
        run: |
          echo "# Daily Security Audit Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.security-audit.result }}" = "failure" ]; then
            echo "⚠️ **Security vulnerabilities detected. Check the created issue for details.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **No security issues found. All dependencies are secure.**" >> $GITHUB_STEP_SUMMARY
          fi
