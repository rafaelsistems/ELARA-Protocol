name: Fuzzing

on:
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      duration_hours:
        description: 'Fuzzing duration in hours'
        required: false
        default: '8'
        type: string
      target:
        description: 'Specific fuzz target to run (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - wire_protocol
          - crypto_operations
          - state_reconciliation

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTFLAGS: -Zsanitizer=address

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 540  # 9 hours (8h fuzzing + 1h buffer)
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - wire_protocol
          - crypto_operations
          - state_reconciliation
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
          cache-on-failure: true
      
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      
      - name: Restore corpus from cache
        uses: actions/cache/restore@v4
        id: corpus-cache
        with:
          path: |
            fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-
      
      - name: Calculate fuzzing duration
        id: duration
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.duration_hours }}" ]; then
            HOURS="${{ github.event.inputs.duration_hours }}"
          else
            HOURS=8
          fi
          
          # Distribute 8 hours across 3 targets = ~2.67 hours per target
          SECONDS=$((HOURS * 3600 / 3))
          echo "seconds=$SECONDS" >> $GITHUB_OUTPUT
          echo "hours=$HOURS" >> $GITHUB_OUTPUT
          echo "Fuzzing ${{ matrix.target }} for $SECONDS seconds (~$((SECONDS / 3600))h $((SECONDS % 3600 / 60))m)"
      
      - name: Run fuzzing campaign
        id: fuzz
        continue-on-error: true
        run: |
          cd fuzz
          
          # Create output directory for this run
          mkdir -p ../fuzz-results/${{ matrix.target }}
          
          # Run fuzzer with timeout and capture output
          echo "Starting fuzzing campaign for ${{ matrix.target }}..."
          echo "Duration: ${{ steps.duration.outputs.seconds }} seconds"
          echo "Start time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          
          cargo +nightly fuzz run ${{ matrix.target }} \
            -- \
            -max_total_time=${{ steps.duration.outputs.seconds }} \
            -jobs=$(nproc) \
            -timeout=10 \
            -rss_limit_mb=4096 \
            -print_final_stats=1 \
            -artifact_prefix=../fuzz-results/${{ matrix.target }}/ \
            2>&1 | tee ../fuzz-results/${{ matrix.target }}/fuzz.log
          
          FUZZ_EXIT_CODE=$?
          echo "exit_code=$FUZZ_EXIT_CODE" >> $GITHUB_OUTPUT
          echo "End time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          
          # Check if crashes were found
          if [ -d "artifacts/${{ matrix.target }}" ] && [ "$(ls -A artifacts/${{ matrix.target }})" ]; then
            echo "crashes_found=true" >> $GITHUB_OUTPUT
            echo "⚠️ Crashes found in ${{ matrix.target }}!"
            ls -lh artifacts/${{ matrix.target }}/
          else
            echo "crashes_found=false" >> $GITHUB_OUTPUT
            echo "✅ No crashes found in ${{ matrix.target }}"
          fi
      
      - name: Extract fuzzing statistics
        if: always()
        id: stats
        run: |
          cd fuzz-results/${{ matrix.target }}
          
          # Extract key statistics from log
          if [ -f fuzz.log ]; then
            EXECS=$(grep -oP 'exec/s: \K[0-9]+' fuzz.log | tail -1 || echo "0")
            TOTAL_EXECS=$(grep -oP 'total: \K[0-9]+' fuzz.log | tail -1 || echo "0")
            COV=$(grep -oP 'cov: \K[0-9]+' fuzz.log | tail -1 || echo "0")
            
            echo "execs_per_sec=$EXECS" >> $GITHUB_OUTPUT
            echo "total_execs=$TOTAL_EXECS" >> $GITHUB_OUTPUT
            echo "coverage=$COV" >> $GITHUB_OUTPUT
            
            echo "### Fuzzing Statistics" >> stats.md
            echo "- **Executions/sec**: $EXECS" >> stats.md
            echo "- **Total executions**: $TOTAL_EXECS" >> stats.md
            echo "- **Coverage edges**: $COV" >> stats.md
            echo "- **Duration**: ${{ steps.duration.outputs.seconds }}s (~$((steps.duration.outputs.seconds / 3600))h)" >> stats.md
          fi
      
      - name: Save corpus to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
      
      - name: Minimize crash artifacts
        if: steps.fuzz.outputs.crashes_found == 'true'
        run: |
          cd fuzz
          echo "Minimizing crash artifacts..."
          
          for crash in artifacts/${{ matrix.target }}/*; do
            if [ -f "$crash" ]; then
              echo "Minimizing: $crash"
              cargo +nightly fuzz tmin ${{ matrix.target }} "$crash" || true
            fi
          done
      
      - name: Generate crash report
        if: steps.fuzz.outputs.crashes_found == 'true'
        id: crash-report
        run: |
          cd fuzz
          
          REPORT_FILE="../fuzz-results/${{ matrix.target }}/crash-report.md"
          
          echo "# Fuzzing Crash Report: ${{ matrix.target }}" > "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "**Target**: \`${{ matrix.target }}\`" >> "$REPORT_FILE"
          echo "**Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> "$REPORT_FILE"
          echo "**Commit**: ${{ github.sha }}" >> "$REPORT_FILE"
          echo "**Run**: ${{ github.run_id }}" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          
          echo "## Crashes Found" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          
          CRASH_COUNT=0
          for crash in artifacts/${{ matrix.target }}/*; do
            if [ -f "$crash" ]; then
              CRASH_COUNT=$((CRASH_COUNT + 1))
              CRASH_NAME=$(basename "$crash")
              
              echo "### Crash $CRASH_COUNT: \`$CRASH_NAME\`" >> "$REPORT_FILE"
              echo "" >> "$REPORT_FILE"
              echo "**File size**: $(stat -f%z "$crash" 2>/dev/null || stat -c%s "$crash") bytes" >> "$REPORT_FILE"
              echo "" >> "$REPORT_FILE"
              
              # Try to reproduce and capture output
              echo "**Reproduction**:" >> "$REPORT_FILE"
              echo "\`\`\`bash" >> "$REPORT_FILE"
              echo "cargo +nightly fuzz run ${{ matrix.target }} $crash" >> "$REPORT_FILE"
              echo "\`\`\`" >> "$REPORT_FILE"
              echo "" >> "$REPORT_FILE"
              
              # Show hex dump of crash input (first 256 bytes)
              echo "**Input (hex dump, first 256 bytes)**:" >> "$REPORT_FILE"
              echo "\`\`\`" >> "$REPORT_FILE"
              hexdump -C "$crash" | head -20 >> "$REPORT_FILE"
              echo "\`\`\`" >> "$REPORT_FILE"
              echo "" >> "$REPORT_FILE"
            fi
          done
          
          echo "crash_count=$CRASH_COUNT" >> $GITHUB_OUTPUT
          
          # Append statistics
          if [ -f "../fuzz-results/${{ matrix.target }}/stats.md" ]; then
            echo "" >> "$REPORT_FILE"
            cat "../fuzz-results/${{ matrix.target }}/stats.md" >> "$REPORT_FILE"
          fi
          
          echo "" >> "$REPORT_FILE"
          echo "## Next Steps" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "1. Reproduce the crash locally using the command above" >> "$REPORT_FILE"
          echo "2. Debug the issue and implement a fix" >> "$REPORT_FILE"
          echo "3. Add the crash input to the regression test suite" >> "$REPORT_FILE"
          echo "4. Verify the fix prevents the crash" >> "$REPORT_FILE"
          echo "5. Run fuzzing again to ensure no new crashes" >> "$REPORT_FILE"
      
      - name: Upload crash artifacts
        if: steps.fuzz.outputs.crashes_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}-${{ github.run_id }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
            fuzz-results/${{ matrix.target }}/crash-report.md
          retention-days: 90
      
      - name: Upload fuzzing logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-logs-${{ matrix.target }}-${{ github.run_id }}
          path: |
            fuzz-results/${{ matrix.target }}/fuzz.log
            fuzz-results/${{ matrix.target }}/stats.md
          retention-days: 30
      
      - name: Create GitHub issue for crashes
        if: steps.fuzz.outputs.crashes_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const crashReport = fs.readFileSync('fuzz-results/${{ matrix.target }}/crash-report.md', 'utf8');
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Fuzzing] Crashes found in ${{ matrix.target }}`,
              body: crashReport,
              labels: ['bug', 'fuzzing', 'security', 'priority:high']
            });
            
            console.log(`Created issue #${issue.data.number}`);
            
            // Add comment with artifact link
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.data.number,
              body: `📦 Crash artifacts available: [Download from workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });
      
      - name: Check performance threshold
        if: always() && steps.stats.outputs.execs_per_sec != ''
        run: |
          EXECS_PER_SEC=${{ steps.stats.outputs.execs_per_sec }}
          THRESHOLD=10000
          
          echo "Executions per second: $EXECS_PER_SEC"
          echo "Threshold: $THRESHOLD"
          
          if [ "$EXECS_PER_SEC" -lt "$THRESHOLD" ]; then
            echo "⚠️ Warning: Fuzzing performance below threshold ($EXECS_PER_SEC < $THRESHOLD exec/s)"
            echo "This may indicate performance issues or resource constraints."
          else
            echo "✅ Fuzzing performance meets threshold ($EXECS_PER_SEC >= $THRESHOLD exec/s)"
          fi
      
      - name: Fail job if crashes found
        if: steps.fuzz.outputs.crashes_found == 'true'
        run: |
          echo "❌ Fuzzing found ${{ steps.crash-report.outputs.crash_count }} crash(es) in ${{ matrix.target }}"
          echo "See the created GitHub issue for details and reproduction steps."
          exit 1

  summary:
    name: Fuzzing Summary
    runs-on: ubuntu-latest
    needs: fuzz
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Fuzzing Campaign Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| wire_protocol | ${{ needs.fuzz.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| crypto_operations | ${{ needs.fuzz.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| state_reconciliation | ${{ needs.fuzz.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.fuzz.result }}" = "failure" ]; then
            echo "⚠️ **Crashes were found during fuzzing. Check the created issues for details.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **No crashes found. All fuzz targets passed.**" >> $GITHUB_STEP_SUMMARY
          fi
