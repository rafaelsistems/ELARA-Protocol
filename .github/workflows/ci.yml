name: CI

on:
  push:
    branches: [ main, develop ]
    tags:
      - "v*"
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --workspace --all-features

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-features -- --test-threads=1

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: lcov.info
          fail_ci_if_error: false

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}
          generate_release_notes: false
          name: ${{ github.ref_name }}
          body: |
            Automated release for ${{ github.ref_name }}

  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    strategy:
      matrix:
        crate:
          - elara-core
          - elara-wire
          - elara-transport
          - elara-crypto
          - elara-time
          - elara-state
          - elara-runtime
          - elara-msp
          - elara-visual
          - elara-voice
          - elara-diffusion
      fail-fast: false
      max-parallel: 1  # Publish one at a time for dependency order
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Update dependencies to published versions
        run: |
          cd crates/${{ matrix.crate }}
          sed -i 's/elara-core = { path = "..\/elara-core" }/elara-core = "0.1.0"/g' Cargo.toml
          sed -i 's/elara-wire = { path = "..\/elara-wire" }/elara-wire = "0.1.0"/g' Cargo.toml
          sed -i 's/elara-crypto = { path = "..\/elara-crypto" }/elara-crypto = "0.1.0"/g' Cargo.toml
          sed -i 's/elara-time = { path = "..\/elara-time" }/elara-time = "0.1.0"/g' Cargo.toml
          sed -i 's/elara-state = { path = "..\/elara-state" }/elara-state = "0.1.0"/g' Cargo.toml
          sed -i 's/elara-transport = { path = "..\/elara-transport" }/elara-transport = "0.1.0"/g' Cargo.toml
      
      - name: Publish to crates.io
        if: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cd crates/${{ matrix.crate }}
          cargo publish --token $CARGO_REGISTRY_TOKEN
          sleep 30  # Wait for crate to be available
      
      - name: Create release notes
        if: success()
        run: |
          echo "## ${{ matrix.crate }} v0.1.0 Published! 🚀" >> release-${{ matrix.crate }}.md
          echo "" >> release-${{ matrix.crate }}.md
          echo "**${{ matrix.crate }}** is now available on [crates.io](https://crates.io/crates/${{ matrix.crate })!" >> release-${{ matrix.crate }}.md
          echo "" >> release-${{ matrix.crate }}.md
          echo "Part of the ELARA Protocol - Universal Real-time Communication Substrate" >> release-${{ matrix.crate }}.md
